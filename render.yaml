services:
  - type: web
    name: drink-project
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: drink-project-db
          property: connectionString
      - key: DC_WEBHOOK_URL
        sync: false

 databases:
  - name: drink-project-db
    databaseName: drinkdb
    user: drinkuser
    plan: free
